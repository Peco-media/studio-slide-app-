// ── 再生成ボタン ──────────────────────────────────────────────────────────
function regenSchedule() {
  // 現在のテーブルからカット行・移動行・休憩行を取得してS.cutsDataに同期
  const tbody = document.getElementById('editBody');
  if (tbody) {
    const rows = [...tbody.rows].map(tr=>({
      row_type: tr.dataset.rt||'cut',
      timeS: tr.querySelector('.ci-ts')?.value||'',
      timeE: tr.querySelector('.ci-te')?.value||'',
      num: tr.querySelector('.ci-num')?.value.trim()||'',
      content: tr.querySelector('.ci-content')?.value.trim()||'',
      location: tr.querySelector('.ci-loc')?.value.trim()||'',
      cast: tr.querySelector('.ci-cast')?.value.trim()||'',
      durationMin: parseInt(tr.querySelector('.ci-dur')?.value||0)||0,
      note: tr.querySelector('.ci-note')?.value.trim()||'',
      type:'スチール', cam:'1カメ',
    }));
    // カット行をcutsDataに保存（move/break行は除く）
    const cuts = rows.filter(r=>r.row_type==='cut'&&(r.num||r.content));
    if (cuts.length) S.cutsData = cuts;
    // S.scenesのdurationMinも同期
    cuts.forEach(cut=>{
      const scene = S.scenes ? S.scenes.find(s=>s.num===cut.num) : null;
      if (scene && cut.durationMin) scene.durationMin = cut.durationMin;
    });
  }

  // S.cutsDataから時間を積み上げ直す（buildRowsは使わない）
  const startMin = parseTime(S.shootStart)||9*60;
  const lunchDur = parseInt(((S.lunch||'').match(/(\d+)分/)||[0,60])[1]);
  let cursor = startMin;
  const newCuts = [];

  (S.cutsData||[]).forEach(cut=>{
    const dur = cut.durationMin||60;
    cut.timeS = minToStr(cursor);
    cut.timeE = minToStr(cursor + dur);
    cursor += dur;
    newCuts.push(cut);
    // lunchCutoffのカットの後にお昼を挿入
    if (S.lunchCutoff && S.lunchCutoff===cut.num && S.lunch && S.lunch!=='なし') {
      const lunchStart = minToStr(cursor);
      newCuts.push({row_type:'break',timeS:lunchStart,timeE:minToStr(cursor+lunchDur),
        content:`昼休憩・準備（${lunchDur}分）`,num:'',type:'',cam:'',note:''});
      cursor += lunchDur;
    }
    // セットチェンジ（次のカットと場所が違う場合）
    const nextCut = (S.cutsData||[])[newCuts.filter(r=>r.row_type==='cut').length];
    if (nextCut && nextCut.location && cut.location && nextCut.location!==cut.location) {
      const scMin = 15;
      newCuts.push({row_type:'set_change',timeS:minToStr(cursor),timeE:minToStr(cursor+scMin),
        content:`移動・セットチェンジ（${scMin}分）`,num:'',type:'',cam:'',note:`${scMin}分`});
      cursor += scMin;
    }
  });
  S.cutsData = newCuts;

  const schedRows = buildRows();
  S.scheduleRows = schedRows;
  showEditTable();

  setTimeout(()=>{
    const area = document.getElementById('chatArea');
    const tbl = document.getElementById('editBody');
    if (tbl && area) {
      const bubble = tbl.closest('.msg');
      if (bubble) area.scrollTop = bubble.offsetTop - 20;
    }
    toast('スケジュール表を再生成しました ✅','ok');
  }, 200);
}

async function genOutput(type) {

// ── Excel ──────────────────────────────────────────────────────────────────
async function genXlsx(rows) {
  // SheetJS via ESM
  const XLSX = await import('https://esm.sh/xlsx@0.18.5');
  const wb = XLSX.utils.book_new();

  // ── 情報シート ──
  const infoData=[
    ['香盤表',S.title||''],
    ['撮影日・場所',S.dateplace||''],
    ['撮影種別',S.medium||''],
    ['撮影場所',S.location||''],
    ['スタッフイン',offsetTime(S.shootStart,-60)],
    ['撮影開始',S.shootStart||''],
    ['昼休憩',S.lunch||''],
    ['撮影終了',S.shootEnd||''],
    ['完全撤収',S.wrapUp||''],
    ['クライアント',S.client==='来場する'?`来場（${S.clientTime}）`:(S.client||'—')],
    ['キャスト',S.casts.map(c=>`${c.name}（IN:${c.inTime||'—'}${c.outTime?'〜'+c.outTime:''}）`).join('、')],
  ];
  const wsInfo=XLSX.utils.aoa_to_sheet(infoData);
  wsInfo['!cols']=[{wch:16},{wch:40}];
  XLSX.utils.book_append_sheet(wb,wsInfo,'基本情報');

  // ── 香盤表シート ──
  const header=['No./種別','開始','終了','内容','種別','カメラ','備考'];
  const data=[header];
  rows.forEach(r=>{
    const rt=r.row_type||'cut';
    if(rt==='cut'){
      data.push([r.num||'',r.timeS||'',r.timeE||'',r.content||'',r.type||'',r.cam||'',r.note||'']);
    } else {
      data.push([ROW_LABEL[rt]||rt,r.timeS||'',r.timeE||'',r.content||'','','',r.note||'']);
    }
  });
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:18},{wch:8},{wch:8},{wch:40},{wch:10},{wch:12},{wch:20}];

  // 行の高さとスタイル（SheetJSではセルスタイルはProのみ対応のため基本的なものだけ）
  XLSX.utils.book_append_sheet(wb,ws,'香盤表');

  const buf=XLSX.write(wb,{type:'array',bookType:'xlsx'});
  downloadBlob(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),`香盤表_${S.title||'撮影'}.xlsx`);
}

// ── PPTX ──────────────────────────────────────────────────────────────────
async function genPptx(rows, ori) {
  if(!window.PptxGenJS){toast('PptxGenJS読み込み中です','err');return;}
  const pres=new window.PptxGenJS();
  const staffIn=offsetTime(S.shootStart,-60);

  if(ori==='l'){
    pres.layout='LAYOUT_WIDE';
    await buildPptxLandscape(pres,rows,staffIn);
  } else {
    pres.defineLayout({name:'A4P',width:7.5,height:10.6});
    pres.layout='A4P';
    await buildPptxPortrait(pres,rows,staffIn);
  }

  const b64=await pres.write({outputType:'base64'});
  const bin=atob(b64);const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  downloadBlob(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.presentationml.presentation'}),`香盤表_${ori==='l'?'横向き':'縦向き'}_${S.title||'撮影'}.pptx`);
}

function downloadBlob(blob,fname){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}

function addPptxRow(slide,row,x,y,cols,rh,isL){

  if(rt!=='cut'){

    slide.addShape('rect',{x,y,w:totalW,h:rh,fill:{color:bg},line:{color:PC.bd,pt:.5}});
    if(row.timeS) slide.addText(row.timeS,{x:x+cols[0].w+.03,y:y+.02,w:cols[1].w-.06,h:rh-.04,fontSize:fsize-1,color:'666660',align:'center',fontFace:'Meiryo UI',valign:'middle',wrap:true});
    slide.addText(`${label}　${row.content||''}`,{x:x+cols[0].w+cols[1].w+.04,y:y+.02,w:totalW-cols[0].w-cols[1].w-.08,h:rh-.04,fontSize:fsize-1,color:'444440',bold:['shoot_start','shoot_end','wrap_up'].includes(rt),fontFace:'Meiryo UI',valign:'middle',wrap:true});
    return;
  }

  const isV=row.type==='動画';
  const bg=isV?PC.bl:PC.gl;
  const is2cam=row.cam==='2カメ同時';
  let cx=x;
  [
    {t:row.num||'',w:cols[0].w,b:true,a:'center',bg},
    {t:row.timeS&&row.timeE?`${row.timeS}〜${row.timeE}`:row.timeS||'',w:cols[1].w,a:'center',bg:'F9F9F9'},
    {t:row.content||'',w:cols[2].w,bg},
    {t:row.location||'',w:cols[3].w,bg:'F0F8FF'},
    {t:row.cast||'',w:cols[4].w,bg:'F0FAF5'},
    {t:row.durationMin?(row.durationMin<60?row.durationMin+'分':row.durationMin===60?'1時間':row.durationMin%60===0?(row.durationMin/60)+'時間':(Math.floor(row.durationMin/60))+'時間'+(row.durationMin%60)+'分'):'',w:cols[5].w,a:'center',bg:'FFFEF5'},
    {t:row.note||'',w:cols[6].w,bg:PC.wh},

// 行種別ごとの高さ（インチ）
const ROW_H = {
  cut: .46,        // カット行
  break: .26,      // 休憩
  set_change: .22, // セットチェンジ
  move: .24,       // 移動
  staff_in: .22,   // スタッフイン
  client_in: .22,  // クライアントイン
  model_in: .22,   // キャストイン
  model_out: .22,  // キャストアウト
  shoot_start: .28,// 撮影開始
  shoot_end: .25,  // 撮影終了
  wrap_up: .25,    // 完全撤収
};
function rowH(rt){ return ROW_H[rt]||.52; }

async function buildPptxLandscape(pres,rows,staffIn){
  pptxInfoSlide(pres,staffIn);
  const s=pres.addSlide();s.background={color:PC.wh};
  s.addShape('rect',{x:0,y:0,w:13.3,h:.55,fill:{color:PC.g},line:{color:PC.g}});
  s.addText(`${S.title||'香盤表'}　スケジュール`,{x:.3,y:.09,w:10,h:.38,fontSize:13.5,bold:true,color:PC.wh,fontFace:'Meiryo UI',margin:0});
  const cols=[{l:'No.',w:.65},{l:'時間',w:1.5},{l:'内容',w:3.4},{l:'場所',w:1.2},{l:'キャスト',w:1.1},{l:'所要時間',w:.9},{l:'備考/コンテ',w:4.04}];
  let cx=.25;
  const HDR_Y=.62, HDR_H=.26;
  cols.forEach(col=>{
    s.addShape('rect',{x:cx,y:HDR_Y,w:col.w,h:HDR_H,fill:{color:PC.g},line:{color:PC.gd,pt:.5}});
    s.addText(col.l,{x:cx,y:HDR_Y,w:col.w,h:HDR_H,fontSize:9,bold:true,color:PC.wh,align:'center',valign:'middle',fontFace:'Meiryo UI',margin:0});
    cx+=col.w;
  });
  // 余白を詰める：カット行を引き伸ばす
  const AVAIL_L = 7.4 - (HDR_Y+HDR_H);
  const lRows = rows.map(row=>({row, rh:rowH(row.row_type||'cut')}));
  const totalHL = lRows.reduce((s,r)=>s+r.rh,0);
  const surplusL = AVAIL_L - totalHL;
  if(surplusL > 0.1){
    const cutRowsL = lRows.filter(r=>(r.row.row_type||'cut')==='cut');
    if(cutRowsL.length > 0){
      const extra = surplusL / cutRowsL.length;
      cutRowsL.forEach(r=>{ r.rh += extra; });
    }
  }
  let ry=HDR_Y+HDR_H;
  lRows.forEach(({row,rh:rh2})=>{
    if(ry+rh2>7.42) return;
    addPptxRow(s,row,.25,ry,cols,rh2,true);
    ry+=rh2;
  });
  s.addText('※ 撮影の進行状況により順序・時間が変更になる場合があります',{x:.25,y:7.34,w:12,h:.14,fontSize:7,color:PC.gr,fontFace:'Meiryo UI',italic:true});
}

async function buildPptxPortrait(pres,rows,staffIn){
  pptxInfoSlide(pres,staffIn);
  // 縦A4の高さに収まるよう行を自動ページ分割
  const ROW_H_P = { // 縦向き用
    cut:.40, break:.22, set_change:.20, move:.22, staff_in:.20, client_in:.20,
    model_in:.20, model_out:.20, shoot_start:.24, shoot_end:.22, wrap_up:.22,
  };
  const PAGE_H = 10.6;
  const HDR_Y = .52, HDR_H = .24, FOOTER = .22;
  const AVAIL = PAGE_H - HDR_Y - HDR_H - FOOTER;
  const pc=[{l:'No.',w:.48},{l:'時間',w:1.3},{l:'内容',w:1.9},{l:'場所',w:.82},{l:'キャスト',w:.72},{l:'所要時間',w:.62},{l:'備考/コンテ',w:1.51}];

  // ページに分割
  const pages = [[]];
  let pageH = 0;
  rows.forEach(row=>{
    const rh2 = ROW_H_P[row.row_type||'cut']||.46;
    if(pageH+rh2 > AVAIL && pages[pages.length-1].length>0){
      pages.push([]); pageH=0;
    }
    pages[pages.length-1].push({row,rh:rh2});
    pageH+=rh2;
  });

  pages.forEach((pageRows, pageNum)=>{
    // ── 余白をカット行に均等分配してページをいっぱいに使う ──
    const usedH = pageRows.reduce((s,r)=>s+r.rh, 0);
    const surplus = AVAIL - usedH;
    if (surplus > 0.05) {
      const cutRows = pageRows.filter(r=>(r.row.row_type||'cut')==='cut');
      if (cutRows.length > 0) {
        const extra = surplus / cutRows.length;
        cutRows.forEach(r=>{ r.rh += extra; });
      } else {
        // カット行がない場合は全行に均等分配
        const extra = surplus / pageRows.length;
        pageRows.forEach(r=>{ r.rh += extra; });
      }
    }

    const s=pres.addSlide();s.background={color:PC.wh};
    s.addShape('rect',{x:0,y:0,w:7.5,h:.46,fill:{color:PC.g},line:{color:PC.g}});
    const half=pages.length<=1?'':(pageNum===0?'　前半':'　後半');
    s.addText(`${S.title||'香盤表'}　スケジュール${half}`,{x:.2,y:.07,w:7,h:.34,fontSize:12,bold:true,color:PC.wh,fontFace:'Meiryo UI',margin:0});
    let pcx=.15;
    pc.forEach(col=>{
      s.addShape('rect',{x:pcx,y:HDR_Y,w:col.w,h:HDR_H,fill:{color:PC.g},line:{color:PC.gd,pt:.5}});
      s.addText(col.l,{x:pcx,y:HDR_Y,w:col.w,h:HDR_H,fontSize:8,bold:true,color:PC.wh,align:'center',valign:'middle',fontFace:'Meiryo UI',margin:0});
      pcx+=col.w;
    });
    let ry=HDR_Y+HDR_H;
    pageRows.forEach(({row,rh})=>{
      addPptxRow(s,row,.15,ry,pc,rh,false);
      ry+=rh;
    });
    s.addText('※ 撮影の進行状況により変更になる場合があります',{x:.15,y:10.44,w:7.2,h:.13,fontSize:6.5,color:PC.gr,fontFace:'Meiryo UI',italic:true});
  });
}
</script>
