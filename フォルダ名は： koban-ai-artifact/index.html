<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>koban-ai</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="module">
import PptxGenJS from 'https://esm.sh/pptxgenjs@3.12.0';
window.PptxGenJS = PptxGenJS;
</script>
<style>
:root{
  --g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--gm:#5DCAA5;
  --b:#185FA5;--bl:#E6F1FB;
  --su:#F6F5F1;--bd:#E8E6E1;--bd2:#D5D3CE;
  --tx:#181816;--mt:#8E8D88;--wh:#FFFFFF;
  --rs:8px;--sh:0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--su);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Top bar ── */
.topbar{height:50px;background:var(--g);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-logo{display:flex;align-items:center;gap:9px}
.topbar-icon{width:28px;height:28px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.topbar-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:.02em}
.topbar-tag{font-size:10px;color:rgba(255,255,255,.65);font-family:'DM Mono',monospace;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:9px}
.spacer{flex:1}
.topbar-hint{font-size:11px;color:rgba(255,255,255,.7);font-family:'DM Mono',monospace}

.prog{height:3px;background:rgba(255,255,255,.3);flex-shrink:0}
.prog-fill{height:100%;background:#fff;transition:width .5s ease;width:0%}

/* ── Layout ── */
.body{flex:1;display:flex;overflow:hidden}

/* ── Sidebar ── */
.sb{width:248px;flex-shrink:0;background:var(--wh);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-steps{padding:14px 14px 0;display:flex;flex-direction:column;gap:3px}
.sb-step{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--rs);transition:background .15s}
.sb-step.active{background:var(--gl)}
.sb-num{width:21px;height:21px;border-radius:50%;background:var(--bd);color:var(--mt);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace;transition:all .2s}
.sb-step.done .sb-num,.sb-step.active .sb-num{background:var(--g);color:#fff}
.sb-step.done .sb-num::after{content:'✓'}
.sb-step.done .sb-num{font-size:11px}
.sb-label{font-size:12px;font-weight:500;color:var(--mt);line-height:1.3}
.sb-step.active .sb-label,.sb-step.done .sb-label{color:var(--tx)}
.sb-sublabel{font-size:10px;color:var(--mt)}

.sb-sum{flex:1;overflow-y:auto;padding:14px;border-top:1px solid var(--bd);margin-top:12px}
.sb-sum-t{font-size:9.5px;font-weight:700;color:var(--mt);letter-spacing:.08em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px}
.sb-row{display:flex;gap:6px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:11px}
.sb-k{color:var(--mt);min-width:66px;flex-shrink:0}
.sb-v{color:var(--tx);font-weight:500;word-break:break-all;line-height:1.4}
.sb-empty{font-size:11px;color:var(--mt);text-align:center;padding:20px 0;line-height:1.8}

.sb-gen{padding:14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:7px}
.sb-gen-label{font-size:10px;color:var(--mt);font-weight:600;letter-spacing:.05em;margin-bottom:2px}
.btn-gen{width:100%;padding:10px;border-radius:var(--rs);border:none;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-gen.pri{background:var(--g);color:#fff}.btn-gen.pri:hover{background:var(--gd)}
.btn-gen.sec{background:var(--su);color:var(--tx);border:1px solid var(--bd)}.btn-gen.sec:hover{background:var(--bd)}
.btn-gen.ter{background:#1D4ED8;color:#fff}.btn-gen.ter:hover{background:#1E40AF}
.btn-gen:disabled{opacity:.35;cursor:not-allowed}

/* ── Chat ── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-area{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:14px}

.msg{display:flex;gap:10px;align-items:flex-start}
.msg.u{flex-direction:row-reverse;align-self:flex-end;max-width:72%;justify-content:flex-start}
.msg.ai{max-width:680px}
.msg.wide{max-width:100%!important}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.ai .msg-av{background:var(--gl);color:var(--gd)}
.u .msg-av{background:var(--bl);color:var(--b)}
.msg-bub{padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.65}
.ai .msg-bub{background:var(--wh);border:1px solid var(--bd);border-top-left-radius:4px;box-shadow:var(--sh)}
.u .msg-bub{background:var(--g);color:#fff;border-top-right-radius:4px}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.chip{padding:6px 14px;border:1.5px solid var(--bd);border-radius:20px;font-size:12.5px;font-family:'Noto Sans JP',sans-serif;background:var(--wh);color:var(--tx);cursor:pointer;transition:all .15s;font-weight:500}
.chip:hover{border-color:var(--g);color:var(--g);background:var(--gl)}

/* ── Conte guide ── */
.conte-box{border:1.5px solid var(--g);border-radius:10px;padding:13px 15px;margin-top:10px;background:linear-gradient(135deg,var(--gl),#d4efe4)}
.conte-box-t{font-weight:700;color:var(--gd);margin-bottom:7px;font-size:13px}
.conte-box ol{padding-left:18px;line-height:2.1;color:var(--tx);font-size:13px}
.paste-area{width:100%;margin-top:10px;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:12.5px;font-family:'Noto Sans JP',sans-serif;background:var(--wh);color:var(--tx);resize:vertical;min-height:80px;outline:none}
.paste-area:focus{border-color:var(--g)}
.paste-btn{margin-top:7px;padding:8px 18px;background:var(--g);color:#fff;border:none;border-radius:var(--rs);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.paste-btn:hover{background:var(--gd)}

/* ── Edit table ── */
.edit-wrap{margin-top:11px;overflow-x:auto;border-radius:var(--rs);border:1px solid var(--bd)}
.edit-tbl{border-collapse:collapse;font-size:12px;width:100%;min-width:600px}
.edit-tbl th{background:var(--g);color:#fff;padding:7px 9px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap;position:sticky;top:0}
.edit-tbl td{padding:4px 6px;border-bottom:1px solid var(--bd);vertical-align:middle}
.edit-tbl tr:last-child td{border-bottom:none}
/* row colors */
tr[data-rt="staff_in"] td{background:#EEF0FE}
tr[data-rt="client_in"] td{background:#FEF0EE}
tr[data-rt="model_in"] td{background:#EDF7F2}
tr[data-rt="model_out"] td{background:#FFF5F5}
tr[data-rt="set_change"] td{background:#FEFCE8}
tr[data-rt="break"] td{background:#FFF3F3}
tr[data-rt="shoot_start"] td{background:#E8F8F0}
tr[data-rt="shoot_end"] td{background:#F0F0FF}
tr[data-rt="wrap_up"] td{background:#F0F0FF}
tr[data-rt="move"] td{background:#E8F0FE}
tr[data-rt="cut"] td{background:#fff}
tr[data-rt="cut"]:nth-child(even) td{background:#FAFAF8}
.ci{width:100%;padding:4px 7px;border:1px solid var(--bd);border-radius:4px;font-size:11.5px;font-family:'Noto Sans JP',sans-serif;background:var(--wh);color:var(--tx);outline:none}
.ci:focus{border-color:var(--g)}
.ci-sel{padding:4px 5px;border:1px solid var(--bd);border-radius:4px;font-size:11px;font-family:'Noto Sans JP',sans-serif;background:var(--wh);color:var(--tx);outline:none;cursor:pointer}
.ci-sel:focus{border-color:var(--g)}
.del-btn{padding:3px 9px;background:#FEE2E2;color:#DC2626;border:1px solid #FCA5A5;border-radius:4px;font-size:10.5px;cursor:pointer;white-space:nowrap}
.del-btn:hover{background:#FCA5A5}
.drag-h{width:22px;text-align:center;cursor:grab;color:var(--mt);font-size:15px;user-select:none;padding:0!important}
.drag-h:active{cursor:grabbing}
tr.dragging{opacity:.35}
tr.dov-top td{border-top:2.5px solid var(--g)!important}
tr.dov-bot td{border-bottom:2.5px solid var(--g)!important}
.rt-badge{font-size:10.5px;color:var(--mt);white-space:nowrap;font-weight:500}

.add-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.add-btn{padding:5px 11px;background:var(--su);color:var(--tx);border:1px solid var(--bd);border-radius:20px;font-size:11.5px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap}
.add-btn:hover{background:var(--bd)}
.confirm-btn{margin-top:10px;padding:9px 20px;background:var(--g);color:#fff;border:none;border-radius:var(--rs);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.confirm-btn:hover{background:var(--gd)}

/* ── Input ── */
.input-wrap{border-top:1px solid var(--bd);padding:13px 28px;background:var(--wh);display:flex;gap:8px;align-items:center;flex-shrink:0}
.txt-in{flex:1;padding:10px 16px;border:1.5px solid var(--bd);border-radius:22px;font-size:13.5px;font-family:'Noto Sans JP',sans-serif;background:var(--su);color:var(--tx);outline:none;transition:border-color .15s}
.txt-in:focus{border-color:var(--g);background:var(--wh)}
.txt-in::placeholder{color:var(--mt)}
.btn-send{width:38px;height:38px;border-radius:50%;background:var(--g);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.btn-send:hover{background:var(--gd)}

/* ── Typing ── */
.typing-dots{display:flex;gap:4px;align-items:center;padding:3px 2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--mt);animation:bnc 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bnc{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;background:var(--tx);color:#fff;border-radius:var(--rs);font-size:12.5px;font-weight:500;opacity:0;transform:translateY(6px);transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--g)}.toast.err{background:#C62828}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.msg-edit-btn{position:absolute;top:6px;right:6px;padding:2px 8px;background:var(--su);border:1px solid var(--bd);border-radius:8px;font-size:10px;color:var(--mt);cursor:pointer;opacity:0;transition:opacity .15s;font-family:'Noto Sans JP',sans-serif}
.msg:hover .msg-edit-btn{opacity:1}
.msg-edit-btn:hover{background:var(--gl);border-color:var(--g);color:var(--g)}
.ai .msg-bub{position:relative}

/* ── サイドバー編集パネル ── */
.sb-panel{border-bottom:1px solid var(--bd);padding:10px 12px}
.sb-panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sb-panel-title{font-size:11px;font-weight:700;color:var(--mt);letter-spacing:.06em;text-transform:uppercase;font-family:'DM Mono',monospace}
.sb-edit-btn{font-size:10px;padding:2px 8px;background:var(--su);border:1px solid var(--bd);border-radius:10px;cursor:pointer;color:var(--mt);font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.sb-edit-btn:hover{border-color:var(--g);color:var(--g)}
.sb-field{display:flex;flex-direction:column;gap:2px;margin-bottom:7px}
.sb-field-label{font-size:10px;color:var(--mt);font-weight:500}
.sb-field-val{font-size:12px;color:var(--tx);font-weight:500;line-height:1.4}
.sb-inp{width:100%;padding:4px 7px;border:1px solid var(--bd);border-radius:4px;font-size:11.5px;font-family:'Noto Sans JP',sans-serif;background:var(--wh);color:var(--tx);outline:none}
.sb-inp:focus{border-color:var(--g)}
.sb-sel{width:100%;padding:4px 6px;border:1px solid var(--bd);border-radius:4px;font-size:11.5px;font-family:'Noto Sans JP',sans-serif;background:var(--wh);color:var(--tx);outline:none;cursor:pointer}
.sb-sel:focus{border-color:var(--g)}
.sb-apply-btn{width:100%;margin-top:6px;padding:6px;background:var(--g);color:#fff;border:none;border-radius:4px;font-size:11.5px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer}
.sb-apply-btn:hover{background:var(--gd)}
.sb-cast-row{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--bd);font-size:11.5px}
.sb-cast-name{flex:1;font-weight:500}
.sb-cast-time{color:var(--mt);font-size:10.5px}
.sb-regen-btn{width:100%;padding:9px;background:#1D4ED8;color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:5px}
.sb-regen-btn:hover{background:#1E40AF}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-icon">🐾</div>
    <div class="topbar-name">koban-ai</div>
    <div class="topbar-tag">Claude powered</div>
  </div>
  <div class="spacer"></div>
  <div class="topbar-hint" id="topHint">会話を進めてください</div>
</div>
<div class="prog"><div class="prog-fill" id="progFill"></div></div>

<div class="body">
  <aside class="sb">
    <div class="sb-steps" id="sbSteps">
      <div class="sb-step active" data-s="0"><div class="sb-num">1</div><div class="sb-label">基本情報</div></div>
      <div class="sb-step" data-s="1"><div class="sb-num">2</div><div class="sb-label">撮影種別</div></div>
      <div class="sb-step" data-s="2"><div class="sb-num">3</div><div class="sb-label">キャスト情報</div></div>
      <div class="sb-step" data-s="3"><div class="sb-num">4</div><div class="sb-label">スケジュール</div></div>
      <div class="sb-step" data-s="4"><div class="sb-num">5</div><div class="sb-label">クライアント</div></div>
      <div class="sb-step" data-s="5"><div class="sb-num">6</div><div class="sb-label">カット情報</div></div>
      <div class="sb-step" data-s="6"><div class="sb-num">7</div><div class="sb-label">確認・編集・出力</div></div>
    </div>
    <!-- 対話中：サマリー表示 -->
    <div class="sb-sum" id="sbSumArea">
      <div class="sb-sum-t">入力サマリー</div>
      <div id="sbRows"><div class="sb-empty">会話を進めると<br>ここに表示されます</div></div>
    </div>
    <!-- 完了後：編集パネル（初期非表示） -->
    <div id="sbEditArea" style="flex:1;overflow-y:auto;display:none"></div>

    <div class="sb-gen">
      <button class="sb-regen-btn" id="btnRegen" onclick="regenSchedule()" style="display:none">🔄 スケジュール表を再生成</button>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button class="btn-gen sec" onclick="exportData()" style="flex:1;font-size:11px;padding:7px">💾 保存</button>
        <label class="btn-gen sec" style="flex:1;font-size:11px;padding:7px;cursor:pointer;text-align:center">
          📂 読み込む<input type="file" accept=".json" onchange="importData(event)" style="display:none">
        </label>
      </div>
      <div class="sb-gen-label">出力形式を選択</div>
      <button class="btn-gen pri" id="btnXlsx" onclick="genOutput('xlsx')" disabled>📊 Excel（.xlsx）</button>
      <button class="btn-gen sec" id="btnPptL" onclick="genOutput('pptL')" disabled>⬜ PowerPoint 横向き</button>
      <button class="btn-gen ter" id="btnPptP" onclick="genOutput('pptP')" disabled>📄 PowerPoint 縦向き</button>
    </div>
  </aside>

  <div class="chat-wrap">
    <div class="chat-area" id="chatArea"></div>
    <div class="input-wrap">
      <input class="txt-in" id="txtIn" placeholder="メッセージを入力..."/>
      <button class="btn-send" onclick="onSend()">➤</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
const S = {
  title:'', dateplace:'', medium:'',
  staffIn:'', shootStart:'', shootEnd:'', wrapUp:'', lunch:'',
  client:'', clientTime:'',
  casts: [],        // [{kind:'pet'|'human', name, inTime, outTime}]
  castCount: 0, castIdx: 0,
  scheduleRows: [], // 最終テーブルデータ
  cutsData: [],     // カット行のみ
};
let pendingKey = null;
let waitText = false;
let activeStep = 0;

// ══════════════════════════════════════════════════════════════════════════════
// TIME HELPERS
// ══════════════════════════════════════════════════════════════════════════════
const TIME_OPTS = ['','7:00','7:15','7:30','7:45','8:00','8:15','8:30','8:45','9:00','9:15','9:30','9:45','10:00','10:15','10:30','10:45','11:00','11:15','11:30','11:45','12:00','12:15','12:30','12:45','13:00','13:15','13:30','13:45','14:00','14:15','14:30','14:45','15:00','15:15','15:30','15:45','16:00','16:15','16:30','16:45','17:00','17:15','17:30','17:45','18:00','18:15','18:30','18:45','19:00'];
const mkTOpts = sel => {
  // 完全一致しない場合は15分刻みに丸めて最近傍を探す
  let matched = sel;
  if (sel && !TIME_OPTS.includes(sel)) {
    const t = parseTime(sel);
    if (t != null) matched = minToStr(Math.round(t/15)*15);
  }
  return TIME_OPTS.map(t=>`<option value="${t}" ${t===matched?'selected':''}>${t||'—'}</option>`).join('');
};

function parseTime(str) {
  if (!str) return null;
  const m = str.match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  return parseInt(m[1])*60 + parseInt(m[2]);
}
function minToStr(min) {
  if (min == null) return '';
  return `${Math.floor(min/60)}:${String(min%60).padStart(2,'0')}`;
}
function offsetTime(base, offsetMin) {
  const t = parseTime(base);
  if (t == null) return '';
  return minToStr(t + offsetMin);
}
function extractTimes(str) {
  const all = [...(str||'').matchAll(/(\d{1,2}:\d{2})/g)];
  return { t1: all[0]?all[0][1]:'', t2: all[1]?all[1][1]:'' };
}

// ══════════════════════════════════════════════════════════════════════════════
// CHAT HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function mkEl(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=(type==='ok'?'✅ ':type==='err'?'❌ ':'')+msg;
  t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.className='toast',3000);
}

function addAI(txt, chips, key, ph) {
  pendingKey = key;
  waitText = !chips;
  const inp = document.getElementById('txtIn');
  inp.disabled = false;
  inp.value = '';
  inp.placeholder = ph || (chips ? '↑ 上の選択肢から選んでください' : 'メッセージを入力...');
  const area = document.getElementById('chatArea');
  const wrap = mkEl('div','msg ai');
  wrap.dataset.key = key||'';  // どの質問かを記録
  const av = mkEl('div','msg-av'); av.textContent='AI';
  const bub = mkEl('div','msg-bub');
  bub.innerHTML = txt.replace(/\n/g,'<br>');
  if (chips) {
    const cd = mkEl('div','chips');
    chips.forEach(c=>{
      const btn = mkEl('button','chip'); btn.textContent=c;
      btn.onclick = ()=>handle(c, key);
      cd.appendChild(btn);
    });
    bub.appendChild(cd);
  }

  // 修正ボタンはsetTimeoutで非同期に追加（addAI末尾で処理）

  wrap.appendChild(av); wrap.appendChild(bub);
  area.appendChild(wrap); area.scrollTop=area.scrollHeight;
  updateUI();
  setTimeout(()=>addEditBtnToPrev(null), 80);
}

// 全AIバブルに修正ボタンを追加（未設置のみ・スキップ対象を除く）
const NON_EDITABLE_KEYS = ['regen','allDur','sortScenes','groupByLoc','groupPreview',

function addEditBtnToPrev(currentKey) {
  const area = document.getElementById('chatArea');
  [...area.querySelectorAll('.msg.ai[data-key]')].forEach(msgEl => {
    const k = msgEl.dataset.key;
    if (!k) return;

// 指定のキーに戻って質問を再表示
function goBackTo(key, msgEl) {
  // その後に続くユーザーの返答バブルを取得して削除するかマーク
  const area = document.getElementById('chatArea');
  const allNodes = [...area.children];
  const msgIdx = allNodes.indexOf(msgEl);

  // msgEl以降のバブルを削除
  allNodes.slice(msgIdx + 1).forEach(n => n.remove());

  // S のうち該当キー以降をリセット
  resetStateFrom(key);

  // 該当の質問を再表示
  addUser('（修正）');
  typing(() => reaskKey(key));
}

// キー以降のStateをリセット
function resetStateFrom(key) {
  const order = ['title','dateplace','medium','castCount','castKind','castName','castIn',
    'location','shootStart','client','clientTime','lunch','shootEnd','wrapUp','conte','moveInfo'];
  const idx = order.indexOf(key);
  if (idx < 0) return;
  // そのキー以降をリセット
  const resetKeys = order.slice(idx);
  resetKeys.forEach(k => {
    if (k === 'castCount') { S.castCount=0; S.castIdx=0; S.casts=[]; }
    else if (k === 'client') { S.client=''; S.clientTime=''; }
    else if (['castKind','castName','castIn'].includes(k)) { /* castは上でリセット */ }
    else if (k==='moveInfo') { S.moves=[]; S.moveType=''; }
    else { S[k]=''; }
  });
}

function handle(val, key) {
  if (key) S[key] = val;
  addUser(val);
  waitText = false;
  const _inp = document.getElementById('txtIn');
  _inp.disabled = false;
  _inp.value = '';
  _inp.placeholder = 'メッセージを入力...';
  updateSummary();

  // ── 分岐 ──────────────────────────────────────────────────────────────────
  // 「その他」入力
  if (['staffIn','shootStart','shootEnd','wrapUp','clientTime'].includes(key) && val==='その他（入力）') {
    typing(()=>{ waitText=true; pendingKey=key; addAI('時間を入力してください。',null,key,'例：9:30'); }); return;
  }

  switch(key) {
    case 'title':      typing(()=>askDateplace()); break;
    case 'dateplace':  typing(()=>askMedium()); break;
    case 'medium':     S.medium=''; typing(()=>askCastCount()); break;
    case 'castCount':
      S.castCount = parseInt(val)||1; S.castIdx=0; S.casts=[];
      typing(()=>askCastKind(0)); break;
    case 'castKind':
      S._castKindTmp = val;
      typing(()=>askCastName(S.castIdx)); break;
    case 'castName':
      S._castNameTmp = val;
      typing(()=>askCastIn(S.castIdx)); break;
    case 'castIn': break; // handled by button in askCastIn
    case 'location':
      typing(()=>askShootStart());
      break;
    case 'shootStart': typing(()=>askClient()); break;
    case 'client':
      if (val==='来場する') typing(()=>askClientTime());
      else { S.clientTime=''; typing(()=>askLunch()); }
      break;
    case 'clientTime': typing(()=>askLunch()); break;
    case 'lunch':      typing(()=>askShootEnd()); break;
    case 'shootEnd':   typing(()=>askWrapUp()); break;
    case 'wrapUp':     typing(()=>askConte()); break;
    case 'conte':
      if (val.includes('AIに')) typing(()=>showAIScheduleForm());
      else if (val.includes('シーンを入力')) typing(()=>askSceneList());
      else if (val.includes('アップロード')) typing(()=>showConteGuide());
      else typing(()=>askCutsManual());
      break;
    case 'sceneList': break; // フォームボタンで処理
    case 'sceneMore': break; // フォームボタンで処理
    case 'cutsTotal':
      S.cutsData = makeDummyCuts(val);
      updateSummary();
      typing(()=>showEditTable(), 300);
      break;
        default: typing(()=>showFinal()); break;
  }
}

async function parseBriefWithAI(text) {
  const prompt = `以下の撮影案件概要を解析してJSONで返してください。JSON以外は不要です。

【概要】
${text}

形式：
{"title":"","dateplace":"","shootStart":"10:00","shootEnd":"17:00","lunch":"60分","location":"スタジオ撮影","client":"来場する","clientTime":"09:30","staffIn":"09:00","wrapUp":"18:00","casts":[{"kind":"🐾 ペット（猫）","name":"","inTime":"","outTime":""}],"scenes":[{"num":"C01","content":"","location":"","cast":"","durationMin":45,"note":""}],"notes":""}

ルール：
- shootStart/shootEndはHH:MM形式
- lunchは"45分"か"60分"か"なし"（お昼の区切りシーンは別途決めるので不要）
- locationは「スタジオ撮影」「ロケ撮影」「スタジオ＋ロケ」のいずれか
- clientTimeは撮影開始30分前を必ず設定する（client=来場する場合）。不明な場合も推定で入れること
- castsのinTimeは撮影開始30分前を必ず設定する。不明な場合も推定で入れること
- castsのoutTimeはそのキャストの最後の撮影シーン終了後30分程度を設定する。不明な場合はshootEndを設定
- scenesは注意事項を守って撮影順に（キャストごとにまとめる等）
- durationMin：猫が食べる=90、犬が食べる=60、くつろぐ=45、遊ぶ=45、商品=30`;

  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  const raw=data.content?.[0]?.text||'';
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m) throw new Error('解析できませんでした');
  const r=JSON.parse(m[0]);

  S.title      = r.title||'';
  S.dateplace  = r.dateplace||'';
  S.shootStart = r.shootStart||'';
  S.shootEnd   = r.shootEnd||'';
  S.lunch      = r.lunch||'60分';
  S.lunchCutoff= ''; // タイムライン生成後に提案するためここでは設定しない
  S.location   = r.location||'スタジオ撮影';
  S.client     = r.client||'来場しない';
  S.wrapUp     = r.wrapUp||offsetTime(S.shootEnd,60)||'';
  S.staffIn    = r.staffIn||offsetTime(S.shootStart,-60)||'';

  // クライアントIN：来場ありなら撮影開始30分前
  const defaultClientIn = S.client.includes('来場する') ? offsetTime(S.shootStart,-30)||'' : '';
  S.clientTime = (r.clientTime&&r.clientTime!=='') ? r.clientTime : defaultClientIn;

  // キャストのIN/OUT：シーンのcastと照合してアウト時間を自動設定
  const defaultCastIn  = offsetTime(S.shootStart,-30)||S.shootStart;
  const defaultCastOut = S.shootEnd;

  S.casts = (r.casts||[]).map(cast=>{
    const name = cast.name||'';
    // このキャストが最後に登場するシーンの終了時間を推定
    const castScenes = (r.scenes||[]).filter(s=>(s.cast||'').includes(name));
    // シーンのdurationMinを積み上げてアウト時間を算出
    let outTime = (cast.outTime&&cast.outTime!=='') ? cast.outTime : defaultCastOut;
    return {
      kind:    cast.kind||'🐾 ペット（猫）',
      name,
      inTime:  (cast.inTime&&cast.inTime!=='') ? cast.inTime : defaultCastIn,
      outTime,
    };
  });
  S.castCount = S.casts.length;
  S.scenes = (r.scenes||[]).map(s=>({
    num:s.num||'C01', content:s.content||'',
    location:s.location||'', cast:s.cast||'',
    durationMin:s.durationMin||45, note:s.note||'',
    type:'スチール', cam:'1カメ',
  }));
  S.aiNotes = r.notes||'';

  // 強制フォールバック：clientTimeが空なら必ず設定
  if (!S.clientTime || S.clientTime==='') {
    S.clientTime = offsetTime(S.shootStart,-30)||S.shootStart;
  }
  // 強制フォールバック：castのinTimeが空なら必ず設定
  const forcedCastIn2 = offsetTime(S.shootStart,-30)||S.shootStart;
  S.casts.forEach(cast=>{
    if (!cast.inTime||cast.inTime==='') {
      cast.inTime = forcedCastIn2;
    }
  });

  showBriefConfirm();
}

async function parseBriefWithAIFix(fixInstruction) {
  // 現在のS全体をJSON文字列化してAIに渡す
  const currentState = {
    title: S.title,
    dateplace: S.dateplace,
    shootStart: S.shootStart,
    shootEnd: S.shootEnd,
    lunch: S.lunch,
    location: S.location,
    client: S.client,
    clientTime: S.clientTime,
    casts: S.casts.map(c=>({name:c.name,kind:c.kind,inTime:c.inTime,outTime:c.outTime})),
    scenes: S.scenes.map(s=>({num:s.num,content:s.content,location:s.location,cast:s.cast,durationMin:s.durationMin,note:s.note})),
    notes: S.aiNotes,
  };

  const prompt = `以下の撮影スケジュール情報に対して修正指示があります。指示を反映して修正後の情報をJSONで返してください。JSON以外は不要です。

【現在の情報】
${JSON.stringify(currentState, null, 2)}

【修正指示】
${fixInstruction}

返答形式（修正した項目のみでなく全項目を返してください）：
{
  "title": "",
  "dateplace": "",
  "shootStart": "10:00",
  "shootEnd": "17:00",
  "lunch": "60分",
  "location": "スタジオ撮影",
  "client": "来場する",
  "clientTime": "09:30",
  "casts": [{"kind":"","name":"","inTime":"","outTime":""}],
  "scenes": [{"num":"C01","content":"","location":"","cast":"","durationMin":45,"note":""}],
  "notes": "修正内容の説明"
}

ルール：
- 修正指示を最優先で守ること
- 指示がない項目は現在の値をそのまま維持すること
- scenesは撮影順に並べる
- shootStart/shootEndはHH:MM形式`;

  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  const raw=data.content?.[0]?.text||'';
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m) throw new Error('解析できませんでした');
  const r=JSON.parse(m[0]);

  // 全項目をSに反映
  if(r.title)      S.title      = r.title;
  if(r.dateplace)  S.dateplace  = r.dateplace;
  if(r.shootStart) S.shootStart = r.shootStart;
  if(r.shootEnd)   S.shootEnd   = r.shootEnd;
  if(r.lunch)      S.lunch      = r.lunch;
  if(r.location)   S.location   = r.location;
  if(r.client)     S.client     = r.client;
  if(r.clientTime) S.clientTime = r.clientTime;
  if(r.casts&&r.casts.length){
    S.casts=r.casts.map(cast=>({
      kind:cast.kind||'🐾 ペット（猫）',
      name:cast.name||'',
      inTime:cast.inTime||S.shootStart,
      outTime:cast.outTime||S.shootEnd,
    }));
    S.castCount=S.casts.length;
  }
  if(r.scenes&&r.scenes.length){
    S.scenes=r.scenes.map(s=>({
      num:s.num||'C01',content:s.content||'',location:s.location||'',
      cast:s.cast||'',durationMin:s.durationMin||45,note:s.note||'',
      type:'スチール',cam:'1カメ',
    }));
  }
  if(r.notes) S.aiNotes=(S.aiNotes?S.aiNotes+'\n':'')+'[修正] '+r.notes;

  // 強制フォールバック
  if(!S.clientTime) S.clientTime=offsetTime(S.shootStart,-30)||S.shootStart;
  const forcedIn=offsetTime(S.shootStart,-30)||S.shootStart;
  S.casts.forEach(cast=>{
    if(!cast.inTime||cast.inTime==='') cast.inTime=forcedIn;
    if(!cast.outTime||cast.outTime==='') cast.outTime=S.shootEnd||'';
  });

  showBriefConfirm();
}

<span style="font-size:12px;color:var(--mt)">撮影開始（${S.shootStart}）の30分前をデフォルトにしています</span>`;

  const clientComes = S.client&&(S.client.includes('来場')||S.client==='あり');
  if(clientComes){
    const row=document.createElement('div');
    row.style.cssText='background:var(--su);border-radius:8px;padding:10px 12px';
    row.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--tx);margin-bottom:8px">🤝 クライアント</div>`;

    inRow.style.cssText='display:flex;gap:8px;align-items:center;font-size:12px';

    const inSel=document.createElement('select');inSel.className='ci-sel';inSel.style.cssText='padding:5px 8px;font-size:12px';
    const clientDefault = (S.clientTime&&S.clientTime!=='')?S.clientTime:defaultIn;
    TIME_OPTS.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t||'—';if(t===clientDefault)o.selected=true;inSel.appendChild(o);});
    inSel.value=clientDefault;
    inRow.appendChild(inSel);row.appendChild(inRow);
    form.appendChild(row);
    refs.push({type:'client',inSel,outSel:null});
  }

  // キャスト
  S.casts.forEach((cast,i)=>{
    const row=document.createElement('div');
    row.style.cssText='background:var(--su);border-radius:8px;padding:10px 12px';
    row.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--tx);margin-bottom:8px">🐾 ${cast.name}</div>`;

    inRow.style.cssText='display:flex;gap:8px;align-items:center;font-size:12px;margin-bottom:6px';

    const inSel=document.createElement('select');inSel.className='ci-sel';inSel.style.cssText='padding:5px 8px;font-size:12px';
    const castInDefault = (cast.inTime&&cast.inTime!=='')?cast.inTime:defaultIn;
    TIME_OPTS.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t||'—';if(t===castInDefault)o.selected=true;inSel.appendChild(o);});
    inSel.value=castInDefault;
    inRow.appendChild(inSel);

    const outRow=document.createElement('div');
    outRow.style.cssText='display:flex;gap:8px;align-items:center;font-size:12px';
    outRow.innerHTML=`<span style="color:var(--mt);width:60px">OUT時間</span>`;
    const outSel=document.createElement('select');outSel.className='ci-sel';outSel.style.cssText='padding:5px 8px;font-size:12px';

    outSel.value=castOutDefault;
    outRow.appendChild(outSel);

    row.appendChild(inRow);row.appendChild(outRow);
    form.appendChild(row);
    refs.push({type:'cast',idx:i,inSel,outSel});

  bub.appendChild(form);

        S.clientTime=ref.inSel.value;

        S.casts[ref.idx].inTime=ref.inSel.value;

      }

    confBtn.disabled=true;
    addUser('IN/OUT時間を確定');
    // スケジュール生成へ
    if(S.scenes&&S.scenes.length){
      typing(()=>buildSceneSchedule());
    } else {
      typing(()=>askShootStart());
    }
  };
  bub.appendChild(confBtn);

  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
  pendingKey='castTimes';waitText=false;
  document.getElementById('txtIn').disabled=true;
  updateUI();

function showIndoorMoveForm(hasBothTypes) {

  const tbl=document.createElement('table');
  tbl.style.cssText='width:100%;border-collapse:collapse;margin-top:10px;font-size:12.5px';

      tr.innerHTML=`<td style="padding:5px 10px;font-weight:700;color:var(--g)">${scene.num}</td><td style="padding:5px 10px">${scene.content}</td>`;
      const locTd=document.createElement('td');locTd.style.padding='4px 8px';

      addUser('施設内撮影場所を設定');

function showOutdoorMoveForm() {
  S.moves=[];
  const area=document.getElementById('chatArea');
  const wrap=mkEl('div','msg ai wide');
  const av=mkEl('div','msg-av');av.textContent='AI';
  const bub=mkEl('div','msg-bub');

  const list=document.createElement('div');
  list.style.cssText='display:flex;flex-direction:column;gap:8px;margin-top:10px';

  function addOutdoorRow() {
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--su);border-radius:var(--rs);border:1px solid var(--bd)';

    const mkLbl=(t)=>{const s=document.createElement('span');s.style.cssText='font-size:11.5px;color:var(--mt);white-space:nowrap';s.textContent=t;return s;};
    const mkInp=(ph,w)=>{const i=document.createElement('input');i.className='ci';i.placeholder=ph;i.style.cssText=`width:${w}px;padding:6px 9px;font-size:12px`;return i;};

    const afterInp=mkInp('どのカット後？例：C02の後',160);
    const fromInp=mkInp('移動元 例：渋谷スタジオ',140);
    const toInp=mkInp('移動先 例：屋上テラス',140);
    const durSel=document.createElement('select');durSel.className='ci-sel';
    durSel.style.cssText='padding:6px 8px;font-size:12px';
    [10,15,20,30,45,60,90,120].forEach(m=>{
      const opt=document.createElement('option');opt.value=m;
      opt.textContent=m<60?m+'分':m===60?'1時間':(Math.floor(m/60))+'時間'+(m%60?m%60+'分':'');
      durSel.appendChild(opt);
    });
    durSel.value=30;

    const delBtn=document.createElement('button');
    delBtn.textContent='✕';delBtn.style.cssText='padding:5px 9px;background:#FEE2E2;color:#DC2626;border:1px solid #FCA5A5;border-radius:4px;font-size:12px;cursor:pointer';
    delBtn.onclick=()=>row.remove();

    row.appendChild(mkLbl('タイミング:'));row.appendChild(afterInp);
    row.appendChild(mkLbl('移動元:'));row.appendChild(fromInp);
    row.appendChild(mkLbl('移動先:'));row.appendChild(toInp);
    row.appendChild(mkLbl('時間:'));row.appendChild(durSel);
    row.appendChild(delBtn);
    list.appendChild(row);afterInp.focus();
  }
  addOutdoorRow();
  bub.appendChild(list);

  const addBtn=mkEl('button','add-btn');addBtn.textContent='＋ 移動を追加';addBtn.style.marginTop='8px';
  addBtn.onclick=()=>addOutdoorRow();
  bub.appendChild(addBtn);

  const confBtn=mkEl('button','confirm-btn');confBtn.textContent='✅ 確定する';confBtn.style.marginTop='10px';
  confBtn.onclick=()=>{
    S.moves=[...list.children].map(row=>{
      const inps=row.querySelectorAll('input');
      const sel=row.querySelector('select');
      return {afterCut:inps[0]?.value.trim()||'',from:inps[1]?.value.trim()||'',destination:inps[2]?.value.trim()||'',durationMin:parseInt(sel?.value)||30};
    }).filter(m=>m.afterCut||m.destination);
    const summary=S.moves.length?S.moves.map(m=>`${m.afterCut}→${m.destination}(${m.durationMin}分)`).join('、'):'なし';
    addUser(`移動：${summary}`);
    confBtn.disabled=true;
    typing(()=>askLunchCutoff());
  };
  bub.appendChild(confBtn);

  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
  pendingKey='outdoorMove';waitText=false;
  updateUI();
}

async function generateAISchedule(castText, conteText, notesText) {
  // 基本情報をプロンプトに組み込む
  const baseInfo = [
    S.title ? `タイトル：${S.title}` : '',
    S.dateplace ? `日時・場所：${S.dateplace}` : '',
    S.shootStart ? `撮影開始：${S.shootStart}` : '',
    S.shootEnd ? `撮影終了予定：${S.shootEnd}` : '',
    S.lunch && S.lunch!=='なし' ? `昼休憩：${S.lunch}` : '',
    S.location ? `撮影場所：${S.location}` : '',
  ].filter(Boolean).join('\n');

  const prompt = `あなたはペット広告の撮影ディレクターです。以下の情報をもとに最適な撮影スケジュール（香盤表）を組み立ててください。

【基本情報】
${baseInfo}

【出演者・キャスト】
${castText}

【コンテ一覧】
${conteText}

【注意事項・撮影条件】
${notesText || 'なし'}

以下のJSON形式で返答してください。JSON以外のテキストは不要です。

{
  "scenes": [
    {
      "num": "C01",
      "content": "シーン内容",
      "location": "撮影場所",
      "cast": "出演キャスト名",
      "durationMin": 45,
      "note": "備考"
    }
  ],
  "schedule_notes": "スケジュール全体の補足説明"
}

ルール：
- scenesは撮影順に並べる（注意事項の条件を守ること）
- durationMinは内容から推定（食べるシーン:猫60〜90分、くつろぐ:30〜45分、遊ぶ:45分等）
- castは出演者名を記入
- 撮影場所ごとにまとめてセットチェンジを最小化する
- 注意事項がある場合は必ず守ること`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2000,
      messages: [{role:'user', content: prompt}]
    })
  });

  const data = await res.json();
  const text = data.content?.[0]?.text || '';

  // JSONをパース
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('AIの返答を解析できませんでした');

  const result = JSON.parse(jsonMatch[0]);
  const scenes = result.scenes || [];

  if (!scenes.length) throw new Error('シーンが生成されませんでした');

  // S.scenesに設定
  S.scenes = scenes.map((s,i) => ({
    num: s.num || `C${String(i+1).padStart(2,'0')}`,
    content: s.content || '',
    location: s.location || '',
    cast: s.cast || '',
    durationMin: s.durationMin || 45,
    note: s.note || '',
    type: 'スチール',
    cam: '1カメ',
  }));

  // 結果を表示
  const area=document.getElementById('chatArea');
  const wrap=mkEl('div','msg ai wide');
  const av=mkEl('div','msg-av');av.textContent='AI';
  const bub=mkEl('div','msg-bub');

  let html=`✅ <strong>${scenes.length}シーン</strong>のスケジュールを組み立てました！<br>`;
  if(result.schedule_notes){
    html+=`<div style="background:var(--gl);border-radius:7px;padding:8px 12px;font-size:12px;margin:8px 0;color:var(--gd)">${result.schedule_notes}</div>`;
  }
  html+=`<div style="background:var(--su);border-radius:7px;padding:8px 12px;font-size:12px;line-height:1.9;margin:8px 0">`;
  S.scenes.forEach(s=>{
    html+=`<div><strong style="color:var(--g);min-width:36px;display:inline-block">${s.num}</strong>`;
    html+=`<span style="color:var(--mt);margin:0 6px;font-size:11px">${s.location||''}</span>`;
    html+=`<span style="color:var(--mt);margin-right:6px;font-size:11px">${s.cast||''}</span>`;
    html+=`${s.content}`;
    const t=s.durationMin;
    const tStr=t<60?t+'分':t===60?'1時間':t%60===0?(t/60)+'時間':(Math.floor(t/60))+'時間'+(t%60)+'分';
    html+=`<span style="color:var(--mt);font-size:11px;margin-left:6px">(${tStr})</span>`;
    html+='</div>';
  });
  html+='</div>';
  bub.innerHTML=html;

  const cd=mkEl('div','chips');cd.style.marginTop='9px';
  const okBtn=mkEl('button','chip');okBtn.textContent='✅ このスケジュールで進む';
  okBtn.style.cssText='background:var(--g);color:#fff;border-color:var(--g)';
  okBtn.onclick=()=>{
    addUser('このスケジュールで進む');
    typing(()=>askLunchCutoff());
  };
  const redoBtn=mkEl('button','chip');redoBtn.textContent='✏️ 内容を修正して再生成';
  redoBtn.onclick=()=>{
    addUser('修正して再生成する');
    typing(()=>showAIScheduleForm());
  };
  cd.appendChild(okBtn);cd.appendChild(redoBtn);
  bub.appendChild(cd);

  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
  document.getElementById('txtIn').disabled=false;
}

// ── シーン内容からデフォルト所要時間を推定 ─────────────────────────────────
function estimateDuration(content) {
  const c = content;
  // ① 猫が食べる → 90分（犬より先に判定）
  if (/猫.*食べ|ねこ.*食べ|ネコ.*食べ|食べ.*(猫|ねこ|ネコ)/.test(c)) return 90;
  if (/(猫|ねこ|ネコ).*(食事|ご飯|フード|食器)/.test(c)) return 90;
  // ② 犬が食べる → 60分
  if (/犬.*食べ|いぬ.*食べ|ワンコ.*食べ|食べ.*(犬|いぬ|わんこ|ワンコ)/.test(c)) return 60;
  if (/(犬|いぬ|わんこ|ワンコ).*(食事|ご飯|フード|食器)/.test(c)) return 60;
  // 食べる系（種別不明）→ 60分
  if (/食べ(る|てい|終わ)|食事|ご飯|フード.*食|食器.*食/.test(c)) return 60;
  // ③ ペットが遊ぶ → 45分
  if (/遊ぶ|遊んで|じゃれ|おもちゃ|ボール/.test(c)) return 45;
  // ④ ペットがくつろぐ・寝る → 60分
  if (/くつろ[ぐぎ]|寝て|寝る|まどろ|休んで|リラックス/.test(c)) return 60;
  // ⑤ パッケージ・商品写真 → 30分
  if (/パッケージ|商品|正面|アップ|クローズ|物撮り|ブツ撮り/.test(c)) return 30;
  // ⑥ 散歩・ドッグラン → 60分
  if (/散歩|ドッグラン|走る|外.*歩/.test(c)) return 60;
  // その他
  if (/2カメ|同時撮影/.test(c)) return 90;
  if (/家族|飼い主|一緒|触れ合い/.test(c)) return 45;
  if (/シャンプー|お風呂|グルーミング/.test(c)) return 45;
  if (/集合写真|家族写真|ポーズ/.test(c)) return 30;
  // デフォルト
  return 45;
}

function parseSceneList(raw) {
  // 最初に選んだ撮影種別をデフォルトに使う
  const defaultType = S.medium && S.medium.includes('動画') && !S.medium.includes('スチール')
    ? '動画' : 'スチール';
  return raw.trim().split('\n')
    .map(l=>l.trim()).filter(Boolean)
    .map((content, i) => ({
      num: `C${String(i+1).padStart(2,'0')}`,
      content,
      type: defaultType,
      cam: '1カメ',
      durationMin: 0, // askAllDurationsで上書き、estimateDurationでデフォルト提示
    }));
}

    contentInp.className='ci';contentInp.value=scene.content||'';
    contentInp.style.cssText='width:100%;padding:5px 8px;font-size:12px';
    contentInp.setAttribute('draggable','false');
    contentInp.onchange=()=>{ scene.content=contentInp.value; };
    contentTd.appendChild(contentInp);
    tr.appendChild(contentTd);

    // 撮影場所（編集可）
    const locTd=document.createElement('td');
    locTd.style.cssText='padding:4px 8px';
    const locInp=document.createElement('input');
    locInp.className='ci';locInp.value=scene.location||'';
    locInp.placeholder='例：リビング';
    locInp.style.cssText='width:100%;padding:5px 8px;font-size:12px';
    locInp.setAttribute('draggable','false');
    locInp.onchange=()=>{ scene.location=locInp.value; };
    locTd.appendChild(locInp);
    tr.appendChild(locTd);

    // キャスト（1名→プルダウン、2名以上→チェックボックス）
    const castTd=document.createElement('td');
    castTd.style.cssText='padding:4px 8px';
    const castNames=(S.casts||[]).map(c=>c.name);
    const currentCasts=(scene.cast||'').split('・').filter(Boolean);

    if (castNames.length <= 1) {
      // 1名以下：プルダウン（1名の場合はその名前をデフォルト選択）
      const castSel=document.createElement('select');
      castSel.className='ci-sel ci-cast-sort';
      castSel.style.cssText='width:100%;padding:5px 6px;font-size:12px';
      ['', ...castNames].forEach(name=>{
        const opt=document.createElement('option');
        opt.value=name; opt.textContent=name||'（選択）';
        // 1名のみの場合はその名前をデフォルト、複数の場合はscene.castと一致するものを選択
        const defaultVal = castNames.length===1 ? castNames[0] : (scene.cast||'');
        if(name===defaultVal) opt.selected=true;
        castSel.appendChild(opt);
      });
      // scene.castにもデフォルト値を反映
      if (castNames.length===1 && !scene.cast) scene.cast=castNames[0];
      castSel.onchange=()=>{ scene.cast=castSel.value; };
      castTd.appendChild(castSel);
    } else {
      // 2名以上：チェックボックスで複数選択
      const cbWrap=document.createElement('div');
      cbWrap.style.cssText='display:flex;flex-wrap:wrap;gap:4px';
      castNames.forEach(name=>{
        const lbl=document.createElement('label');
        lbl.style.cssText='display:flex;align-items:center;gap:3px;font-size:11.5px;cursor:pointer;white-space:nowrap';
        lbl.setAttribute('draggable','false');
        const cb=document.createElement('input');
        cb.type='checkbox'; cb.value=name;
        cb.checked=currentCasts.includes(name);
        cb.style.cssText='cursor:pointer;accent-color:var(--g)';
        cb.setAttribute('draggable','false');
        cb.onchange=()=>{
          const checked=[...cbWrap.querySelectorAll('input:checked')].map(i=>i.value);
          scene.cast=checked.join('・');
        };
        const txt=document.createTextNode(name);
        lbl.appendChild(cb); lbl.appendChild(txt);
        cbWrap.appendChild(lbl);
      });
      castTd.appendChild(cbWrap);
    }
    tr.appendChild(castTd);

    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  bub.appendChild(tbl);

  // ドラッグ&ドロップ
  const dragTbody=tbody;

  function setupSortDrag(tr, hTd) {
    makeDraggable(hTd, tr, () => dragTbody);
  }

  // 確定ボタン
  const confBtn=mkEl('button','confirm-btn');confBtn.textContent='✅ この順番で確定する';confBtn.style.marginTop='10px';
  confBtn.onclick=()=>{
    // 並び替え後の順番をS.scenesに反映
    const rows=[...tbody.rows];
    const newScenes=rows.map((tr,i)=>{
      const inputs=tr.querySelectorAll('input');
      const oldScene=S.scenes[parseInt(tr.dataset.idx)||i]||S.scenes[i];
      return {
        ...oldScene,
        num:oldScene.num, // カット番号は変更しない
        content:inputs[0]?.value.trim()||oldScene.content||'',
        location:inputs[1]?.value.trim()||oldScene.location||'',
        cast:(()=>{
          const sel=tr.querySelector('.ci-cast-sort');
          if(sel) return sel.value;
          const checks=[...tr.querySelectorAll('input[type=checkbox]:checked')].map(i=>i.value);
          return checks.length?checks.join('・'):(oldScene.cast||'');
        })(),
      };
    });
    S.scenes=newScenes;
    addUser(`撮影順を確定（${newScenes.length}シーン）`);
    confBtn.disabled=true;
    // ロケ撮影の場合は移動情報を確認してからお昼へ
    if (S.location && S.location.includes('ロケ')) {
      typing(()=>askMoveInfo());
    } else {
      typing(()=>askLunchCutoff());
    }
  };
  bub.appendChild(confBtn);

  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
  pendingKey='sortScenes';waitText=false;
  document.getElementById('txtIn').disabled=true;
  document.getElementById('txtIn').placeholder='← ☰ をドラッグして順番を入れ替えてください';
  updateUI();
}

function askGroupByLocation() {

  groupBtn.onclick=()=>{
    // 場所の順番を確定（最初に登場した場所の順）
    const locOrder=[];
    S.scenes.forEach(s=>{
      const loc=s.location||'場所未設定';
      if(!locOrder.includes(loc)) locOrder.push(loc);
    });
    // シーンを場所順に並び替え（各場所内は元の順番を維持）
    const grouped=[];

      S.scenes.filter(s=>(s.location||'場所未設定')===loc).forEach(s=>grouped.push(s));
    });
    // 番号を振り直す
    grouped.forEach((s,i)=>{ s.num=`C${String(i+1).padStart(2,'0')}`; });

    addUser(`場所ごとにまとめました（${locOrder.join('→')}）`);

  bub.appendChild(cd);
  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
  pendingKey='groupByLoc';waitText=false;

function showGroupedPreview(locOrder) {
  const area=document.getElementById('chatArea');
  const wrap=mkEl('div','msg ai wide');
  const av=mkEl('div','msg-av');av.textContent='AI';

      html+=`<div style="padding-left:12px"><span style="color:var(--mt);min-width:36px;display:inline-block">${s.num}</span>${s.content}</div>`;

  const scWrap=document.createElement('div');
  scWrap.style.cssText='display:flex;flex-direction:column;gap:7px;margin-top:8px';

      const opt=document.createElement('option');opt.value=m;
      opt.textContent=m+'分';if(m===15)opt.selected=true;
      sel.appendChild(opt);
    });
    row.appendChild(lbl);row.appendChild(sel);
    scWrap.appendChild(row);
    scRefs.push({from:locOrder[i],to:locOrder[i+1],sel});
  }
  bub.appendChild(scWrap);

  const confBtn=mkEl('button','confirm-btn');confBtn.textContent='✅ この順番で進む';confBtn.style.marginTop='10px';
  confBtn.onclick=()=>{

    addUser('この順番で進む');
    confBtn.disabled=true;
    typing(()=>askLunchCutoff());

  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
  pendingKey='groupPreview';waitText=false;
  updateUI();
}

function askAllDurations() {
  activeStep=5;
  const area=document.getElementById('chatArea');
  const wrap=mkEl('div','msg ai wide');
  const av=mkEl('div','msg-av');av.textContent='AI';
  const bub=mkEl('div','msg-bub');

  bub.innerHTML=`各シーンの撮影場所と所要時間を確認してください。<br><span style="font-size:11.5px;color:var(--mt)">設定後「確定する」を押してください</span>`;

  const DUR_OPTS=[15,30,45,60,75,90,120,150,180];

  // テーブル形式で全シーン表示
  const tbl=document.createElement('table');
  tbl.style.cssText='width:100%;border-collapse:collapse;margin-top:10px;font-size:12.5px';
  tbl.innerHTML=`<thead><tr>
    <th style="background:var(--g);color:#fff;padding:6px 10px;text-align:left;width:52px">No.</th>
    <th style="background:var(--g);color:#fff;padding:6px 10px;text-align:left">内容</th>
    <th style="background:var(--g);color:#fff;padding:6px 10px;text-align:left;width:140px">撮影場所</th>
    <th style="background:var(--g);color:#fff;padding:6px 10px;text-align:left;width:100px">所要時間</th>
  </tr></thead>`;

  const tbody=document.createElement('tbody');
  const selRefs=[]; // {durSel, scene}

  S.scenes.forEach((scene,i)=>{
    const tr=document.createElement('tr');
    tr.style.background=i%2===0?'#fff':'var(--su)';

    // No.
    const tdNum=document.createElement('td');
    tdNum.style.cssText='padding:6px 10px;font-weight:700;color:var(--g)';
    tdNum.textContent=scene.num;
    tr.appendChild(tdNum);

    // 内容
    const tdContent=document.createElement('td');
    tdContent.style.cssText='padding:6px 10px;color:var(--tx)';
    tdContent.textContent=scene.content;
    tr.appendChild(tdContent);

    // 撮影場所入力
    const tdLoc=document.createElement('td');
    tdLoc.style.padding='4px 8px';
    const locInpD=document.createElement('input');
    locInpD.type='text';locInpD.className='ci dur-loc-inp';
    locInpD.placeholder='例：フロント・客室';
    locInpD.value=scene.location||'';
    locInpD.style.cssText='width:100%;padding:5px 8px;font-size:12px';
    locInpD.onchange=()=>{ scene.location=locInpD.value; };
    tdLoc.appendChild(locInpD);
    tr.appendChild(tdLoc);

    // 所要時間セレクト
    const tdDur=document.createElement('td');
    tdDur.style.padding='4px 8px';
    const durSel=document.createElement('select');
    durSel.className='ci-sel';
    durSel.style.cssText='width:100%;padding:5px;font-size:12px';
    DUR_OPTS.forEach(m=>{
      const opt=document.createElement('option');
      opt.value=m;
      opt.textContent=m<60?m+'分':m===60?'1時間':m%60===0?(m/60)+'時間':(Math.floor(m/60))+'時間'+(m%60)+'分';
      if(scene.durationMin===m) opt.selected=true;
      durSel.appendChild(opt);
    });
    // シーン内容からデフォルト時間を推定
    const estimated = estimateDuration(scene.content);
    durSel.value = scene.durationMin || estimated;
    tdDur.appendChild(durSel);
    tr.appendChild(tdDur);

    tbody.appendChild(tr);
    selRefs.push({durSel, scene});
  });
  tbl.appendChild(tbody);
  bub.appendChild(tbl);

  // 確定ボタン
  const confBtn=mkEl('button','confirm-btn');
  confBtn.textContent='✅ この時間で確定する';
  confBtn.style.marginTop='12px';
  confBtn.onclick=()=>{
    // 全シーンに値を反映
    selRefs.forEach(({durSel,locInpD,scene})=>{
      scene.durationMin=parseInt(durSel.value);
      scene.location=locInpD?.value.trim()||scene.location||'';
    });
    const summary=S.scenes.map(s=>{
      const t=s.durationMin;
      const tStr=t<60?t+'分':t===60?'1時間':t%60===0?(t/60)+'時間':(Math.floor(t/60))+'時間'+(t%60)+'分';
      return `${s.num}:${tStr}(${s.cam})`;
    }).join('  ');
    addUser(`時間確定：${summary}`);
    confBtn.disabled=true;
    if(S._fromBrief){
      typing(()=>buildSceneSchedule());
    } else if(S.lunch&&S.lunch!=='なし'){
      typing(()=>askLunchCutoff());
    } else {
      typing(()=>buildSceneSchedule());
    }
  };
  bub.appendChild(confBtn);

  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
  pendingKey='allDur';waitText=false;
  document.getElementById('txtIn').disabled=true;
  document.getElementById('txtIn').placeholder='← 上の表で時間を設定してください';
  updateUI();
}

function buildSceneSchedule() {
  const savedLunchCutoff = S.lunchCutoff; // お昼区切りを保存
  S.lunchCutoff = ''; // buildSceneSchedule中はlunchCutoffを使わない
  const startMin = parseTime(S.shootStart) || 9*60;
  // S.lunch = "12:30〜60分" → lunchStartMin=12:30, lunchDurMin=60
  const parseLunch = () => {
    if (!S.lunch || S.lunch==='なし') return {start:null, dur:60};
    const dur = parseInt((S.lunch.match(/(\d+)分/)||[0,60])[1]);
    // 開始時間はlunchCutoffのシーン終了後（buildで動的に決まる）
    return {start:null, dur};
  };
  const {start:lunchStartMin, dur:lunchDurMin} = parseLunch();
  const SET_CHANGE = 15;
  const setAfter = S.setChangeAfter || [];

  // lunchCutoff: どのシーンまで午前か
  // 'all'=全部午前, 'none'=全部午後, 'Cxx'=そのカットまで午前
  let cursor = startMin;
  const cuts = [];
  let lunchInserted = false;

  S.scenes.forEach((scene, i) => {
    if (!scene.durationMin) scene.durationMin = 60;

    const startT = minToStr(cursor);
    const endT   = minToStr(cursor + scene.durationMin);
    cuts.push({row_type:'cut',num:scene.num,timeS:startT,timeE:endT,
      content:scene.content,type:scene.type,cam:scene.cam,
      location:scene.location||'',cast:scene.cast||'',durationMin:scene.durationMin||0,note:''});
    cursor += scene.durationMin;

    // お昼休憩をlunchCutoffの直後に挿入
    if (!lunchInserted && S.lunch && S.lunch!=='なし' && savedLunchCutoff) {
      const lc = savedLunchCutoff;
      if (lc!=='all' && lc!=='none' && scene.num===lc) {
        cuts.push({row_type:'break',
          timeS:endT, timeE:minToStr(cursor+lunchDurMin),
          content:`昼休憩・準備（${lunchDurMin}分）`,num:'',type:'',cam:'',note:''});
        cursor += lunchDurMin;
        lunchInserted = true;
      }
    }

    // 移動行（ロケの場合）
    if (S.moves && S.moves.length) {
      S.moves.forEach(move=>{
        if (move.afterCut && move.afterCut.includes(scene.num)) {
          cuts.push({row_type:'move',timeS:endT,timeE:minToStr(cursor+move.durationMin),
            content:`移動${move.destination?'：'+move.destination:''}（${move.durationMin}分）`,
            num:'',type:'',cam:'',note:move.destination||''});
          cursor+=move.durationMin;
        }
      });
    }

    // セットチェンジ（手動選択 or 場所の変わり目）
    const nextScene = S.scenes[i+1];
    const locChanged = nextScene && (scene.location||'') !== (nextScene.location||'') && (scene.location||nextScene.location);
    const scMin = locChanged && S.locationChanges
      ? (S.locationChanges.find(lc=>lc.from===(scene.location||'')&&lc.to===(nextScene.location||''))?.min || SET_CHANGE)
      : SET_CHANGE;
    if ((setAfter.includes(scene.num) || locChanged) && i < S.scenes.length-1) {
      const scLabel = locChanged ? `移動・セットチェンジ（${scMin}分）📍${nextScene.location||''}` : 'セットチェンジ';
      cuts.push({row_type:'set_change',timeS:endT,timeE:minToStr(cursor+scMin),
        content:scLabel,num:'',type:'',cam:'',note:`${scMin}分`});
      cursor += scMin;
    }
  });

  // 全カット後にお昼未挿入かつall指定の場合
  if (!lunchInserted && S.lunch && S.lunch!=='なし' && savedLunchCutoff==='all') {
    const lastCut = cuts.filter(r=>r.row_type==='cut').slice(-1)[0];
    if (lastCut) {
      cuts.push({row_type:'break',
        timeS:lastCut.timeE, timeE:minToStr(parseTime(lastCut.timeE)+lunchDurMin),
        content:`昼休憩・準備（${lunchDurMin}分）`,num:'',type:'',cam:'',note:''});
    }
  }

  S.cutsData = cuts;
  S.lunchCutoff = savedLunchCutoff; // 復元
  const cutOnly = cuts.filter(r=>r.row_type==='cut');
  S.cutsTotal = `${cutOnly.length}カット`;
  updateSummary();

  // 終了予定時間を自動更新
  const finMin = parseTime(cuts.filter(r=>r.row_type==='cut').slice(-1)[0]?.timeE);
  if (finMin && !S.shootEnd) S.shootEnd = minToStr(finMin);

  const totalMins = S.scenes.reduce((s,sc)=>s+sc.durationMin,0) + (S.scenes.length-1)*SET_CHANGE;
  const finStr = minToStr(startMin + totalMins);

  // サマリー表示
  const area=document.getElementById('chatArea');
  const wrap=mkEl('div','msg ai');
  const av=mkEl('div','msg-av');av.textContent='AI';
  const bub=mkEl('div','msg-bub');
  let html=`✅ <strong>${cutOnly.length}カット</strong>のタイムラインを自動生成しました！<br>`;
  html+=`<div style="background:var(--su);border-radius:8px;padding:9px 13px;font-size:12px;line-height:1.9;margin:8px 0">`;
  cutOnly.forEach(cut=>{
    html+=`<div><span style="color:var(--g);font-weight:600;min-width:36px;display:inline-block">${cut.num}</span>`;
    html+=`<span style="color:var(--mt);margin-right:6px">${cut.timeS}〜${cut.timeE}</span>`;
    html+=`${cut.content}`;
    if(cut.cam==='2カメ同時') html+=` <span style="font-size:11px;background:#FFF3E0;color:#E65100;padding:1px 6px;border-radius:8px;margin-left:4px">2カメ</span>`;
    html+=`</div>`;
  });
  html+=`</div>`;
  html+=`<span style="font-size:12px;color:var(--mt)">撮影終了予定：<strong>${finStr}</strong>頃（セットチェンジ含む）</span>`;

  bub.innerHTML=html;

  const cd=mkEl('div','chips');cd.style.marginTop='9px';

  const okBtn=mkEl('button','chip');okBtn.textContent='✅ このタイムラインで進む';
  okBtn.onclick=()=>{
    addUser('このタイムラインで進む');
    typing(()=>showEditTable());
  };
  cd.appendChild(okBtn);
  bub.appendChild(cd);
  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
  document.getElementById('txtIn').disabled=false;

  // ── お昼休憩の提案を別バブルで表示 ──────────────────────────────────────
  // 超過あり・お昼区切り確定済みの場合はスキップ
  if (S.lunch && S.lunch !== 'なし' && !S._lunchCutoffFixed && !S._skipTimeline) {
    setTimeout(()=>showLunchProposal(cutOnly), 400);
  }
}

// ── お昼確定後の超過チェック ──────────────────────────────────────────────
function checkOvertime() {
  if (!S.shootEnd || !S.scenes || !S.scenes.length) return;
  const startMin = parseTime(S.shootStart) || 9*60;
  const shootEndMin = parseTime(S.shootEnd);
  if (!shootEndMin) return;

  // S.cutsData から最終終了時間を計算
  const lastCut = (S.cutsData||[]).filter(r=>r.row_type==='cut'||r.row_type==='break').slice(-1)[0];
  const finMin = lastCut ? parseTime(lastCut.timeE) : null;
  if (!finMin) return;

  // セットチェンジ等を加味した実際の終了時間
  const allRows = S.cutsData||[];
  const lastRow = allRows.slice(-1)[0];
  const actualEndMin = lastRow ? (parseTime(lastRow.timeE)||parseTime(lastRow.timeS)||finMin) : finMin;

  if (actualEndMin <= shootEndMin) return; // 超過なし

  const overMin = actualEndMin - shootEndMin;
  const roundedOver = Math.ceil(overMin / 30) * 30;
  const earlyStart = minToStr(startMin - roundedOver);

  const area = document.getElementById('chatArea');
  const wrap = mkEl('div','msg ai');
  const av = mkEl('div','msg-av'); av.textContent='AI';
  const bub = mkEl('div','msg-bub');
  bub.innerHTML=`<div style="background:#FEE2E2;border-radius:7px;padding:8px 12px;font-size:12px;color:#DC2626">
    ⚠️ 設定した撮影終了時間（${S.shootEnd}）を<strong>${overMin}分超過</strong>します。<br>
    撮影開始を <strong>${earlyStart}</strong> にすると収まります。
  </div>`;

  const cd = mkEl('div','chips'); cd.style.marginTop='8px';
  const adjustBtn = mkEl('button','chip');
  adjustBtn.textContent=`⏰ 開始を${earlyStart}に変更する`;
  adjustBtn.style.cssText='background:#FEF2F2;color:#DC2626;border-color:#FCA5A5;font-weight:600';
  adjustBtn.onclick=()=>{
    S.shootStart=earlyStart;
    S._lunchCutoffFixed=true;
    S.scheduleRows=[];
    addUser(`撮影開始を${earlyStart}に変更`);
    typing(()=>buildSceneSchedule());
  };
  const skipBtn=mkEl('button','chip');
  skipBtn.textContent='このまま進む';
  skipBtn.onclick=()=>{ addUser('このまま進む'); typing(()=>showEditTable()); };
  cd.appendChild(adjustBtn); cd.appendChild(skipBtn);
  bub.appendChild(cd);
  wrap.appendChild(av); wrap.appendChild(bub);
  area.appendChild(wrap); area.scrollTop=area.scrollHeight;
}

function showLunchProposal(cutOnly) {
  const lunchDur = parseInt(((S.lunch||'').match(/(\d+)分/)||[0,60])[1]);
  const lunchMin1 = 12*60, lunchMin2 = 13*60+30;
  let bestCut = null;
  for (const cut of cutOnly) {
    const endMin = parseTime(cut.timeE);
    if (endMin && endMin >= lunchMin1 && endMin <= lunchMin2) { bestCut=cut; break; }
    if (endMin && endMin > lunchMin2 && !bestCut) {
      const idx2=cutOnly.indexOf(cut);
      if(idx2>0) bestCut=cutOnly[idx2-1];
      break;
    }
  }
  if (!bestCut) return;

  const area=document.getElementById('chatArea');
  const wrap=mkEl('div','msg ai');
  const av=mkEl('div','msg-av');av.textContent='AI';
  const bub=mkEl('div','msg-bub');
  bub.innerHTML=`🍱 <strong>${bestCut.num}</strong> 終了後（${bestCut.timeE}）にお昼休憩（${lunchDur}分）を入れることを提案します。どうしますか？`;

  const cd=mkEl('div','chips');cd.style.marginTop='8px';

  const yesBtn=mkEl('button','chip');
  yesBtn.textContent=`✅ ${bestCut.num}の後にお昼を入れる`;
  yesBtn.style.cssText='background:var(--g);color:#fff;border-color:var(--gd)';
  yesBtn.onclick=()=>{
    S.lunchCutoff=bestCut.num;
    S._lunchCutoffFixed=true;
    S.scheduleRows=[];
    addUser(`${bestCut.num}の後にお昼を入れる`);
    typing(()=>{ buildSceneSchedule(); setTimeout(()=>checkOvertime(),500); });
  };

  const changeBtn=mkEl('button','chip');
  changeBtn.textContent='✏️ 別の区切りを選ぶ';
  changeBtn.onclick=()=>{
    addUser('別の区切りを選ぶ');
    S._lunchCutoffFixed=false;
    S._afterLunchAction='showEditTable'; // 選択後はスケジュール表へ
    typing(()=>askLunchCutoffForAI(cutOnly));
  };

  const noBtn=mkEl('button','chip');
  noBtn.textContent='お昼なしで進む';
  noBtn.onclick=()=>{
    S.lunchCutoff='none';
    S._lunchCutoffFixed=true;
    S.lunch='なし';
    S.scheduleRows=[];
    addUser('お昼なしで進む');
    typing(()=>{ buildSceneSchedule(); setTimeout(()=>checkOvertime(),500); });
  };

  cd.appendChild(yesBtn);cd.appendChild(changeBtn);cd.appendChild(noBtn);
  bub.appendChild(cd);
  wrap.appendChild(av);wrap.appendChild(bub);
  area.appendChild(wrap);area.scrollTop=area.scrollHeight;
}

function parseConte(raw) {
  if (!raw.trim()) { toast('テキストが空です','err'); return; }
  const lines = raw.trim().split('\n').filter(l=>l.trim());
  const cuts = [];
  lines.forEach(line=>{
    const isVideo = line.includes('動画')||/video/i.test(line);
    const num = (line.match(/[Cc]\d+[A-Za-z]?/)||[])[0]?.toUpperCase()||`C${String(cuts.length+1).padStart(2,'0')}`;
    const {t1,t2} = extractTimes(line);
    let content = line.replace(/[Cc]\d+[A-Za-z]?\s*/,'').replace(/スチール|動画/gi,'').replace(/\d{1,2}:\d{2}[〜～\-]\d{1,2}:\d{2}/g,'').trim();
    const camMatch = content.match(/(2カメ同時|2カメ|1カメ)/);
    const cam = camMatch?camMatch[1]:'1カメ';
    if (camMatch) content = content.replace(camMatch[0],'').trim();
    const noteMatch = content.match(/\s+(テロップ.{0,30})$/);
    const note = noteMatch?noteMatch[1].trim():'';
    if (noteMatch) content = content.replace(noteMatch[0],'').trim();
    cuts.push({row_type:'cut',num,timeS:t1,timeE:t2,content:content||'（内容未記入）',type:isVideo?'動画':'スチール',cam,location:'',note});
  });
  if (!cuts.length) { toast('カット情報を読み取れませんでした','err'); return; }
  // cutsData を scenes に変換してシーンフローへ
  S.scenes = cuts.map(cut=>({
    num: cut.num,
    content: cut.content,
    location: cut.location||'',
    type: cut.type||'スチール',
    cam: cut.cam||'1カメ',
    durationMin: estimateDuration(cut.content),
  }));
  S.title = S.title||'撮影';
  addUser(`コンテ貼り付け完了（${cuts.length}カット）`);
  // シーン確認→グループ化→お昼→時間入力のフローへ
  typing(()=>askMoreOrProceed(), 400);
}

// SCHEDULE ROW BUILDER
// ══════════════════════════════════════════════════════════════════════════════
function buildRows() {
  const rows = [];
  const staffIn = S.shootStart ? (offsetTime(S.shootStart,-60)||S.shootStart) : '';
  const defaultIn30 = S.shootStart ? (offsetTime(S.shootStart,-30)||S.shootStart) : '';
  const clientComes = !!(S.client && (S.client.includes('来場')||S.client==='あり'));
  // IN/OUTが未設定なら強制設定
  if(clientComes){ if(!S.clientTime||S.clientTime==='') S.clientTime=defaultIn30; }
  S.casts.forEach(cast=>{
    if(!cast.inTime||cast.inTime==='') cast.inTime=defaultIn30;
    if(!cast.outTime||cast.outTime==='') cast.outTime=S.shootEnd||'';
  });

  // スタッフイン
  rows.push({row_type:'staff_in', timeS:staffIn, timeE:'', content:'制作・撮影スタッフ 現場入り', cam:'', note:''});


  // クライアントイン（撮影開始30分前を常に自動計算）
  const clientComes2 = clientComes; // 上で定義済み
  if (clientComes2) {
    const ct = offsetTime(S.shootStart,-30)||defaultIn30;
    rows.push({row_type:'client_in', timeS:ct, timeE:'', content:'クライアント 現場入り', cam:'', note:''});
  }

  // キャストイン/アウト（S.cutsDataから毎回動的計算）
  S.casts.forEach(cast=>{
    // S.casts[].inTimeが手動設定済みならそれを優先、未設定ならcutsDataから計算
    const hasManualIn  = cast.inTime  && cast.inTime  !== '' && cast.inTime  !== 'undefined';
    const hasManualOut = cast.outTime && cast.outTime !== '' && cast.outTime !== 'undefined';

    let castInTime  = hasManualIn  ? cast.inTime  : defaultIn30;
    let castOutTime = hasManualOut ? cast.outTime : (S.shootEnd||'');

    // 手動設定がない場合のみcutsDataから推定
    if ((!hasManualIn || !hasManualOut) && S.cutsData && S.cutsData.length) {
      const castCuts = S.cutsData.filter(r=>{
        if (r.row_type!=='cut') return false;
        const rc = r.cast||''; const cn = cast.name||'';
        return rc.includes(cn)||cn.includes(rc)||
          rc.split(/[・、,\s]+/).some(n=>n&&cn.includes(n))||
          cn.split(/[・、,\s]+/).some(n=>n&&rc.includes(n));
      });
      if (castCuts.length) {
        if (!hasManualIn  && castCuts[0].timeS)
          castInTime  = offsetTime(castCuts[0].timeS,-30)||defaultIn30;
        if (!hasManualOut && castCuts[castCuts.length-1].timeE)
          castOutTime = offsetTime(castCuts[castCuts.length-1].timeE,30)||S.shootEnd||'';
      }
    }

    rows.push({
      row_type:'model_in',
      timeS: castInTime,
      timeE: '',
      content: `${cast.name} 現場入り`,
      cam:'',
      note: castOutTime ? `OUT ${castOutTime}` : ''
    });
  });


  // 撮影開始
  rows.push({row_type:'shoot_start', timeS:S.shootStart, timeE:'', content:'★ 撮影開始', cam:'', note:''});

  // 移動行挿入ヘルパー
  const insertMoveAfter = (rows, cutNum) => {
    if (!S.moves || !S.moves.length) return;
    S.moves.forEach(move=>{
      if (move.afterCut && move.afterCut.includes(cutNum)) {
        rows.push({
          row_type:'move',
          timeS:'', timeE:'',
          content:`移動${move.destination ? '：'+move.destination : ''}（${move.durationMin}分）`,
          num:'', type:'', cam:'', note:move.destination||''
        });
      }
    });
  };

  // カット行を挿入
  // シーンフローで生成した場合はbreak行が既にcutsDataに含まれているのでlunchは挿入しない
  // S.cutsDataにbreak行がある場合はbuildSceneScheduleで既に挿入済み→スキップ
  const alreadyHasLunch = S.cutsData.some(r=>r.row_type==='break');
  // S.lunch = "12:30〜60分" → lunchStart="12:30"、「60分」のみの場合はnull
  const lunchParts = (S.lunch&&S.lunch!=='なし') ? S.lunch.split('〜') : [];
  const lunchStart = lunchParts.length>1 ? lunchParts[0] : null;
  const lunchMin = lunchStart ? parseTime(lunchStart) : null;

  let insertedLunch = alreadyHasLunch;
  const lunchCutoffNum = S.lunchCutoff && S.lunchCutoff!=='all' && S.lunchCutoff!=='none'
    ? S.lunchCutoff : null;

  S.cutsData.forEach((cut,i)=>{
    rows.push({...cut});

    // lunchCutoffベースで挿入（カット番号が一致したら次のカットの前に）
    if (!insertedLunch && S.lunch && S.lunch!=='なし') {
      if (lunchCutoffNum && cut.row_type==='cut' && cut.num===lunchCutoffNum) {
        // このカットの直後にお昼を挿入
        insertLunch(rows, cut.timeE||'');
        insertedLunch = true;
      } else if (!lunchCutoffNum && lunchMin) {
        // 時刻ベースでフォールバック
        const nextCut = S.cutsData[i+1];
        if (nextCut && parseTime(nextCut.timeS) >= lunchMin) {
          const prevCut2 = [...rows].filter(r=>r.row_type==='cut').slice(-1)[0];
          insertLunch(rows, prevCut2?.timeE||'');
          insertedLunch = true;
        }
      }
    }
  });

  // 全カット後にもお昼が未挿入なら最後に追加
  if (!insertedLunch && S.lunch && S.lunch!=='なし' && S.lunchCutoff!=='none') {
    const prevCut=[...rows].reverse().find(r=>r.row_type==='cut');
    insertLunch(rows, prevCut?.timeE||'');
  }

  // キャストアウト
  S.casts.filter(c=>c.outTime).forEach(cast=>{
    rows.push({row_type:'model_out', timeS:cast.outTime, timeE:'', content:`${cast.name} OUT`, cam:'', note:''});
  });

  // 撮影終了
  rows.push({row_type:'shoot_end', timeS:S.shootEnd, timeE:'', content:'撮影終了（クランクアップ）', cam:'', note:''});

  // 完全撤収
  rows.push({row_type:'wrap_up', timeS:S.wrapUp, timeE:'', content:'完全撤収', cam:'', note:''});

  return rows;
}

function insertLunch(rows, startTime) {
  // startTime: "12:30" など（buildRows から渡す）
  const durMatch = S.lunch ? S.lunch.match(/(\d+)分/) : null;
  const lunchDur = durMatch ? parseInt(durMatch[1]) : 60;
  const lunchEnd = startTime ? offsetTime(startTime, lunchDur) : '';
  rows.push({row_type:'break', timeS:startTime||'', timeE:lunchEnd, content:`昼休憩・準備（${lunchDur}分）`, cam:'', note:''});
}

function findNearestTime(timeStr) {
  const t = parseTime(timeStr);
  if (t == null) return '';
  // 15分刻みに丸める
  const rounded = Math.round(t / 15) * 15;
  return minToStr(rounded);
}

// ── 撮影場所でグループ化 ──────────────────────────────────────────────────
function groupByLocation() {
  const rows = [...document.getElementById('editBody').rows];
  if (!rows.length) { toast('スケジュール表が空です','err'); return; }

  // カット行の場所を収集（入力順）
  const cutRows = rows.filter(r=>r.dataset.rt==='cut');
  const locations = [];
  const locationMap = {};
  cutRows.forEach(tr=>{
    const loc = tr.querySelector('.ci-loc')?.value.trim()||'（場所未設定）';
    if (!locationMap[loc]) { locationMap[loc]=[]; locations.push(loc); }
    locationMap[loc].push(tr);
  });

  if (locations.length <= 1) { toast('複数の撮影場所を設定してください','err'); return; }

  // 既存の非カット行（スタッフイン等）を前後に保持
  const headRows = []; // 撮影開始前
  const tailRows = []; // 撮影終了後
  let passedStart = false;
  rows.forEach(tr=>{
    const rt = tr.dataset.rt;
    if (rt==='shoot_start') { passedStart=true; headRows.push(tr); return; }
    if (['shoot_end','wrap_up','model_out'].includes(rt)) { tailRows.push(tr); return; }
    if (!passedStart) headRows.push(tr);
    // カット行と中間のスケジュール行はグループ化後に再配置
  });

  // 場所ごとにグループ化してtbodyを再構築
  const tbody = document.getElementById('editBody');
  // 全行をいったん削除
  while(tbody.firstChild) tbody.removeChild(tbody.firstChild);

  // ヘッダー行を戻す
  headRows.forEach(tr=>tbody.appendChild(tr));

  // 場所ごとにブロックを追加
  locations.forEach((loc, i) => {
    // 場所ヘッダー行（セットチェンジ）
    if (i > 0) {
      const scRow = makeRow({row_type:'set_change',timeS:'',timeE:'',
        content:`セットチェンジ → ${loc}`,num:'',type:'',cam:'',note:'15分',location:''});
      tbody.appendChild(scRow);
    } else {
      // 最初の場所は移動行
      const locHeader = makeRow({row_type:'set_change',timeS:'',timeE:'',
        content:`📍 ${loc}`,num:'',type:'',cam:'',note:'',location:''});
      tbody.appendChild(locHeader);
    }
    // その場所のカット行
    locationMap[loc].forEach(tr=>tbody.appendChild(tr));
  });

  // テールの行を戻す
  tailRows.forEach(tr=>tbody.appendChild(tr));

  toast(`${locations.length}か所の撮影場所でグループ化しました`, 'ok');
}

// スケジュール表の時間再計算
// ══════════════════════════════════════════════════════════════════════════════
function recalcTimes() {
  const tbody = document.getElementById('editBody');
  if (!tbody) { toast('スケジュール表が見つかりません','err'); return; }

  const rows = [...tbody.rows];
  const startMin = parseTime(S.shootStart) || 9*60;
  const lunchDurMin = S.lunch && S.lunch!=='なし'
    ? parseInt((S.lunch.match(/(\d+)分/)||[0,60])[1]) : 60;

  let cursor = startMin;

  rows.forEach(tr => {
    const rt = tr.dataset.rt || 'cut';
    const tS = tr.querySelector('.ci-ts');
    const tE = tr.querySelector('.ci-te');
    if (!tS) return;

    switch(rt) {
      case 'staff_in':
        // 開始1時間前に固定
        setSelVal(tS, minToStr(startMin - 60));
        setSelVal(tE, '');
        break;

      case 'client_in':
        // shootStart基準で設定済みの時間はそのまま（再計算しない）
        break;

      case 'model_in':
        // キャストインも固定（変えない）
        break;

      case 'shoot_start':
        setSelVal(tS, S.shootStart||'');
        setSelVal(tE, '');
        cursor = startMin;
        break;

      case 'cut': {
        const numEl2 = tr.querySelector('.ci-num');
        const contentEl2 = tr.querySelector('.ci-content');
        const durSel3 = tr.querySelector('.ci-dur');
        const num2 = numEl2?.value.trim()||'';
        const content2 = contentEl2?.value.trim()||'';
        // ①テーブルのci-dur → ②S.scenes → ③estimate → ④60分
        let useDur2 = durSel3 ? (parseInt(durSel3.value)||0) : 0;
        if (!useDur2) {
          const scene2 = S.scenes ? S.scenes.find(s=>s.num===num2) : null;
          useDur2 = scene2?.durationMin || 0;
        }
        if (!useDur2 && content2) useDur2 = estimateDuration(content2);
        if (!useDur2) useDur2 = 60;
        setSelVal(tS, minToStr(cursor));
        setSelVal(tE, minToStr(cursor + useDur2));
        cursor += useDur2;
        break;
      }

      case 'set_change':
      case 'move': {
        // 備考から分数を取得
        const noteEl = tr.querySelector('.ci-note');
        const noteVal = noteEl?.value || '';
        const minMatch = noteVal.match(/(\d+)分/);
        const dur = minMatch ? parseInt(minMatch[1]) : 15;
        setSelVal(tS, minToStr(cursor));
        setSelVal(tE, minToStr(cursor + dur));
        cursor += dur;
        break;
      }

      case 'break': {
        setSelVal(tS, minToStr(cursor));
        setSelVal(tE, minToStr(cursor + lunchDurMin));
        cursor += lunchDurMin;
        break;
      }

      case 'model_out':
      case 'shoot_end':
        setSelVal(tS, minToStr(cursor));
        setSelVal(tE, '');
        S.shootEnd = minToStr(cursor);
        break;

      case 'wrap_up':
        // 撮影終了の30分後などに設定（現状維持or+30分）
        const wrapMin = parseTime(S.wrapUp) || cursor + 60;
        setSelVal(tS, minToStr(Math.max(cursor, wrapMin)));
        setSelVal(tE, '');
        break;
    }
  });

  toast('時間を再計算しました ✅', 'ok');
}

function setSelVal(sel, val) {
  if (!sel) return;
  // select の option に value があれば選択、なければ最近傍を選ぶ
  const opts = [...sel.options];
  const exact = opts.find(o => o.value === val);
  if (exact) {
    sel.value = val;
  } else if (val) {
    // 最近傍の15分刻みを探す
    const target = parseTime(val);
    if (target != null) {
      let closest = opts[0];
      let minDiff = Infinity;
      opts.forEach(o => {
        if (!o.value) return;
        const t = parseTime(o.value);
        if (t != null && Math.abs(t - target) < minDiff) {
          minDiff = Math.abs(t - target);
          closest = o;
        }
      });
      sel.value = closest.value;
    }
  } else {
    sel.value = '';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// 共通ドラッグ関数（mousedownベース）
// ══════════════════════════════════════════════════════════════════════════════
function makeDraggable(hTd, tr, getTbody) {
  hTd.style.cursor = 'grab';
  hTd.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    const tbody = getTbody();
    if (!tbody) return;
    let dragging = tr;
    dragging.style.opacity = '.5';
    document.body.style.userSelect = 'none';

    function onMove(ev) {
      dragging.style.pointerEvents = 'none';
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      dragging.style.pointerEvents = '';
      const overTr = el ? el.closest('tr') : null;
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('dov-top','dov-bot'));
      if (overTr && overTr !== dragging && overTr.closest('tbody') === tbody) {
        const rect = overTr.getBoundingClientRect();
        if (ev.clientY < rect.top + rect.height / 2) {
          overTr.classList.add('dov-top');
          tbody.insertBefore(dragging, overTr);
        } else {
          overTr.classList.add('dov-bot');
          overTr.after(dragging);
        }
      }
    }
    function onUp() {
      if (dragging) { dragging.style.opacity = '1'; dragging = null; }
      document.body.style.userSelect = '';
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('dov-top','dov-bot'));
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function initDrag(tbodyId) {
  const tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  // 各行のdrag-hにmakeDraggableを設定
  [...tbody.rows].forEach(tr => {
    const hTd = tr.querySelector('.drag-h');
    if (hTd && !hTd.dataset.dragInit) {
      hTd.dataset.dragInit = '1';
      makeDraggable(hTd, tr, () => document.getElementById(tbodyId));
    }
  });
}

// ── 全体の時間をずらす ────────────────────────────────────────────────────
function shiftAllTimes(newStartTime) {
  const oldStart = S.shootStart;
  if (!oldStart || !newStartTime || oldStart === newStartTime) return;

  const oldMin = parseTime(oldStart);
  const newMin = parseTime(newStartTime);
  if (oldMin == null || newMin == null) return;
  const diff = newMin - oldMin;

  S.shootStart = newStartTime;

  // scheduleRows の時間をすべてずらす
  if (S.scheduleRows && S.scheduleRows.length) {
    S.scheduleRows = S.scheduleRows.map(row => {
      const newRow = {...row};
      if (row.timeS) {
        const t = parseTime(row.timeS);
        if (t != null) newRow.timeS = minToStr(Math.max(0, t + diff));
      }
      if (row.timeE) {
        const t = parseTime(row.timeE);
        if (t != null) newRow.timeE = minToStr(Math.max(0, t + diff));
      }
      return newRow;
    });
  }

  // cutsData の時間もずらす
  if (S.cutsData && S.cutsData.length) {
    S.cutsData = S.cutsData.map(row => {
      const newRow = {...row};
      if (row.timeS) { const t=parseTime(row.timeS); if(t!=null) newRow.timeS=minToStr(Math.max(0,t+diff)); }
      if (row.timeE) { const t=parseTime(row.timeE); if(t!=null) newRow.timeE=minToStr(Math.max(0,t+diff)); }
      return newRow;
    });
  }

  // shootEnd / wrapUp も自動調整
  if (S.shootEnd) { const t=parseTime(S.shootEnd); if(t!=null) S.shootEnd=minToStr(Math.max(0,t+diff)); }
  if (S.wrapUp)   { const t=parseTime(S.wrapUp);   if(t!=null) S.wrapUp=minToStr(Math.max(0,t+diff)); }

  S.staffIn = offsetTime(S.shootStart, -60);

  // ── 画面上の編集テーブルのセレクトも直接更新 ──────────────────────────
  const tbody = document.getElementById('editBody');
  if (tbody) {
    [...tbody.rows].forEach(tr => {
      const tS = tr.querySelector('.ci-ts');
      const tE = tr.querySelector('.ci-te');
      if (tS && tS.value) {
        const t = parseTime(tS.value);
        if (t != null) setSelVal(tS, minToStr(Math.max(0, t + diff)));
      }
      if (tE && tE.value) {
        const t = parseTime(tE.value);
        if (t != null) setSelVal(tE, minToStr(Math.max(0, t + diff)));
      }
    });
    // 再計算も実行
    recalcTimes();
    toast('時間をずらしました ✅', 'ok');
  }
}
